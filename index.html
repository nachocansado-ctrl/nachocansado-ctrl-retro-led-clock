<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reloj LED">
    <meta name="theme-color" content="#000000">
    <title>Reloj Digital LED - DS-Digital</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            background: #000000;
        }

        body {
            width: 100%;
            min-height: 100%;
            min-height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'DS-Digital', monospace;
            overflow: hidden;
            padding: 0 !important;
            margin: 0 !important;
            
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
        }

        .reloj-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        .reloj {
            font-size: clamp(100px, 30vw, 500px);
            color: #ff2200;
            font-weight: bold;
            letter-spacing: 0.08em;
            font-family: 'DS-Digital', monospace;
            text-align: center;
            white-space: nowrap;
            position: relative;
            
            /* Efecto LED realista multicapa */
            text-shadow: 
                /* Núcleo brillante central */
                0 0 5px #ff6600,
                0 0 10px #ff4400,
                0 0 15px #ff2200,
                /* Resplandor medio */
                0 0 20px #ff1100,
                0 0 30px #ff0000,
                0 0 40px #cc0000,
                /* Halo exterior */
                0 0 50px rgba(255, 0, 0, 0.8),
                0 0 70px rgba(255, 0, 0, 0.5),
                0 0 90px rgba(255, 0, 0, 0.3),
                /* Sombra interior para profundidad */
                inset 0 0 10px rgba(0, 0, 0, 0.5);
            
            animation: ledPulso 3s ease-in-out infinite;
            filter: brightness(1.2) contrast(1.3);
            -webkit-text-fill-color: #ff2200;
        }

        .numero-apagado {
            color: rgba(255, 34, 0, 0.05);
            text-shadow: 
                0 0 1px rgba(255, 0, 0, 0.05),
                inset 0 0 3px rgba(0, 0, 0, 0.9);
            filter: brightness(0.7);
            opacity: 0.08;
        }

        .dos-puntos {
            animation: parpadeoLED 1s steps(2, start) infinite;
            display: inline-block;
            margin: 0 0.02em;
        }

        /* Efecto de parpadeo realista de LED */
        @keyframes parpadeoLED {
            0%, 49% {
                opacity: 1;
                text-shadow: 
                    0 0 5px #ff6600,
                    0 0 10px #ff4400,
                    0 0 15px #ff2200,
                    0 0 20px #ff1100,
                    0 0 30px #ff0000,
                    0 0 40px #cc0000,
                    0 0 50px rgba(255, 0, 0, 0.8),
                    0 0 70px rgba(255, 0, 0, 0.5),
                    0 0 90px rgba(255, 0, 0, 0.3),
                    inset 0 0 10px rgba(0, 0, 0, 0.5);
            }
            50%, 100% {
                opacity: 0.15;
                text-shadow: 
                    0 0 2px #330000,
                    inset 0 0 5px rgba(0, 0, 0, 0.8);
            }
        }

        /* Pulso sutil de intensidad */
        @keyframes ledPulso {
            0%, 100% {
                text-shadow: 
                    0 0 5px #ff6600,
                    0 0 10px #ff4400,
                    0 0 15px #ff2200,
                    0 0 20px #ff1100,
                    0 0 30px #ff0000,
                    0 0 40px #cc0000,
                    0 0 50px rgba(255, 0, 0, 0.8),
                    0 0 70px rgba(255, 0, 0, 0.5),
                    0 0 90px rgba(255, 0, 0, 0.3),
                    inset 0 0 10px rgba(0, 0, 0, 0.5);
                filter: brightness(1.2) contrast(1.3);
            }
            50% {
                text-shadow: 
                    0 0 8px #ff6600,
                    0 0 15px #ff4400,
                    0 0 20px #ff2200,
                    0 0 25px #ff1100,
                    0 0 35px #ff0000,
                    0 0 45px #cc0000,
                    0 0 60px rgba(255, 0, 0, 0.9),
                    0 0 80px rgba(255, 0, 0, 0.6),
                    0 0 100px rgba(255, 0, 0, 0.4),
                    inset 0 0 15px rgba(0, 0, 0, 0.4);
                filter: brightness(1.4) contrast(1.5);
            }
        }

        /* Efecto de líneas de escaneo (scan lines) */
        .reloj::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(4px);
            }
        }

        /* Efecto de brillo ambiental sutil */
        .reloj::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Contenedor para mayor control */
        .reloj-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Prevent zoom en iOS */
        input[type="text"],
        input[type="button"] {
            font-size: 16px;
        }

        /* Fullscreen mode */
        @media (display-mode: fullscreen) {
            body {
                height: 100vh;
            }
        }

        @media (display-mode: standalone) {
            body {
                height: 100vh;
                padding-bottom: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div class="reloj-container" id="relojContainer">
        <div class="reloj-wrapper">
            <div class="reloj" id="reloj">12:45</div>
        </div>
    </div>

    <script>
        const reloj = document.getElementById('reloj');
        let modo = 1; // 1 = reloj real, 2 = 85:55, 3 = 88:88
        let presionando = false;
        let tiempoPresion = null;

        function actualizarReloj() {
            if (modo === 1) {
                const ahora = new Date();
                let horas = String(ahora.getHours()).padStart(2, '0');
                let minutos = String(ahora.getMinutes()).padStart(2, '0');
                reloj.innerHTML = `${horas}<span class="dos-puntos">:</span>${minutos}`;
            } else if (modo === 2) {
                reloj.innerHTML = `<span class="numero-apagado">8</span>5<span class="dos-puntos">:</span>55`;
            } else if (modo === 3) {
                reloj.innerHTML = `<span class="numero-apagado">8</span>8<span class="dos-puntos">:</span>88`;
            }
        }

        // Actualizar reloj cada segundo
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        // Detección de presión prolongada
        document.addEventListener('mousedown', () => {
            presionando = true;
            tiempoPresion = Date.now();
        });

        document.addEventListener('mouseup', () => {
            if (presionando && tiempoPresion && Date.now() - tiempoPresion >= 700) {
                modo = modo === 3 ? 1 : modo + 1;
                actualizarReloj();
            }
            presionando = false;
            tiempoPresion = null;
        });

        // Soporte táctil para móviles
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            presionando = true;
            tiempoPresion = Date.now();
            // Ocultador de UI - scroll fuerza la barra a desaparecer
            window.scrollTo(0, 1);
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (presionando && tiempoPresion && Date.now() - tiempoPresion >= 700) {
                modo = modo === 3 ? 1 : modo + 1;
                actualizarReloj();
            }
            presionando = false;
            tiempoPresion = null;
            // Reintentar ocultador
            setTimeout(() => {
                window.scrollTo(0, 1);
            }, 200);
        }, { passive: false });

        // Prevenir zoom en iOS
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        });

        // Al cargar, ocultador agresivo
        window.addEventListener('load', () => {
            setTimeout(() => {
                window.scrollTo(0, 1);
            }, 100);
            
            // Cada segundo reintentar
            setInterval(() => {
                window.scrollTo(0, 1);
            }, 1000);
        });

        // Detectar cambios de orientación
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                window.scrollTo(0, 1);
            }, 500);
        });

        // Intentar fullscreen
        document.addEventListener('touchend', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {
                    // Silencioso si falla
                });
            }
        });
    </script>
</body>
</html>
